# ============================================================
# CD Pipeline: Deploy to PRODUCTION
# Triggered ONLY on push to main (after merge from qa)
# Gate: must pass all tests + health check before going live
# ============================================================
name: deploy-production

on:
  push:
    branches: [main]

env:
  PROJECT_ID: aif369-backend
  REGION: us-central1
  ENVIRONMENT: production
  DATASET_ID: aif369_analytics
  SERVICE_NAME: aif369-backend-api

jobs:
  # ── Gate: run full test suite ────────────────────────────
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests (production gate)
        run: pytest tests/ -v --tb=short
        env:
          PROJECT_ID: ${{ env.PROJECT_ID }}
          DATASET_ID: ${{ env.DATASET_ID }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          SMTP_PASSWORD: ""

  # ── Terraform apply PRODUCTION ───────────────────────────
  terraform-apply-prod:
    needs: [verify]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.6"

      - name: Terraform init
        run: terraform init

      - name: Terraform plan (PRODUCTION)
        run: terraform plan -var-file=terraform.tfvars.production -out=tfplan

      - name: Terraform apply (PRODUCTION)
        run: terraform apply -auto-approve tfplan
        continue-on-error: true

  # ── Deploy backend to PRODUCTION ─────────────────────
  deploy-backend-prod:
    needs: [verify]
    if: always() && needs.verify.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and push Docker image
        run: |
          gcloud auth configure-docker gcr.io --quiet
          docker build --platform linux/amd64 \
            -t gcr.io/$PROJECT_ID/aif369-backend:${{ github.sha }} \
            -t gcr.io/$PROJECT_ID/aif369-backend:latest \
            backend/
          docker push gcr.io/$PROJECT_ID/aif369-backend:${{ github.sha }}
          docker push gcr.io/$PROJECT_ID/aif369-backend:latest

      - name: Deploy to Cloud Run (PRODUCTION)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/aif369-backend:${{ github.sha }} \
            --platform managed \
            --region $REGION \
            --project $PROJECT_ID \
            --allow-unauthenticated \
            --service-account aif369-backend-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars "PROJECT_ID=$PROJECT_ID,DATASET_ID=$DATASET_ID,ENVIRONMENT=$ENVIRONMENT" \
            --set-env-vars "SMTP_USER=edaza@aif369.com,NOTIFICATION_EMAIL=edaza@aif369.com,CC_EMAIL=erwin.daza@gmail.com" \
            --update-secrets "SMTP_PASSWORD=aif369-smtp-password:latest,GEMINI_API_KEY=aif369-gemini-api-key:latest,CONTENT_API_KEY=aif369-content-api-key:latest,PAYPAL_CLIENT_ID=aif369-paypal-client-id:latest"

      - name: Verify production deployment
        run: |
          PROD_URL=$(gcloud run services describe $SERVICE_NAME \
            --region $REGION --project $PROJECT_ID \
            --format='value(status.url)')
          echo "Production URL: $PROD_URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL")
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "❌ Health check failed: HTTP $HTTP_CODE"; exit 1
          fi
          echo "✅ Production health check passed"

      - name: Production deployment summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║  PRODUCTION Deployment Complete          ║"
          echo "║  Environment: production                 ║"
          echo "║  Dataset: $DATASET_ID                    ║"
          echo "║  Service: $SERVICE_NAME                  ║"
          echo "╚══════════════════════════════════════════╝"
